        - generic [ref=f20e28]:
          - heading "First look at Signals in Angular" [level=1] [ref=f20e29]
          - generic [ref=f20e30]:
            - generic [ref=f20e31]:
              - text: By
              - link "Tom Kotlar" [ref=f20e34] [cursor=pointer]:
                - /url: https://decodedfrontend.io/author/t-kotlar/
              - text: /
            - generic [ref=f20e35]:
              - text: In
              - link "Angular" [ref=f20e36] [cursor=pointer]:
                - /url: https://decodedfrontend.io/category/angular/
              - text: /
            - generic [ref=f20e37]: 25.06.2024/
            - generic [ref=f20e38]: 6 Min Read/
            - link "Add Comment" [ref=f20e40] [cursor=pointer]:
              - /url: https://decodedfrontend.io/first-look-at-signals-in-angular/#respond
        - generic [ref=f20e41]:
          - figure [ref=f20e42]
          - paragraph [ref=f20e43]: Welcome to your first glimpse into the reactive universe of Angular Signals. As part of Angular’s renaissance, this guide introduces powerful tools which help you build reactive signal-based applications.
          - paragraph [ref=f20e44]:
            - text: According to the Angular documentation, a
            - strong [ref=f20e45]:
              - emphasis [ref=f20e46]: signal
            - text: is a wrapper around a value that notifies interested consumers about changes. Signals can encapsulate any data type, ranging from simple primitives to complex data structures. Essentially, signals are functions that return their current value while notifying dependents of any changes.
          - separator [ref=f20e47]
          - heading "Signals in Action" [level=3] [ref=f20e48]:
            - strong [ref=f20e49]: Signals in Action
          - paragraph [ref=f20e50]: Below, you will find a demo application without signals and our goal will be to refactor it and apply the new reactive primitives.
          - figure "visual of our amazing app" [ref=f20e51]:
            - generic [ref=f20e52]: visual of our amazing app
          - code [ref=f20e54]:
            - generic [ref=f20e55]:
              - generic [ref=f20e56]: <p
              - text: ">"
            - text: "Search Hero: {{search}}"
            - generic [ref=f20e57]:
              - generic [ref=f20e58]: </p
              - text: ">"
            - generic [ref=f20e59]:
              - generic [ref=f20e60]: <input
              - text: type
              - generic [ref=f20e61]: ="text"
              - text: (input)
              - generic [ref=f20e62]: ="setSearchHero($event)"
              - text: ">"
            - generic [ref=f20e63]:
              - generic [ref=f20e64]: <ul
              - text: ">"
            - generic [ref=f20e65]:
              - generic [ref=f20e66]: <li
              - text: "*ngFor"
              - generic [ref=f20e67]: ="let hero of filteredHeroes"
              - text: ">"
            - text: "{{hero.name}}"
            - generic [ref=f20e68]:
              - generic [ref=f20e69]: </li
              - text: ">"
            - generic [ref=f20e70]:
              - generic [ref=f20e71]: </ul
              - text: ">"
            - generic [ref=f20e72]:
              - generic [ref=f20e73]: <button
              - text: (click)
              - generic [ref=f20e74]: ="addHero()"
              - text: ">"
            - text: Add Hero
            - generic [ref=f20e75]:
              - generic [ref=f20e76]: </button
              - text: ">"
          - code [ref=f20e78]: "export class SearchHeroComponent { search = '' heroes = [ {id: 1, name: 'Spider-Man'}, {id: 2, name: 'Scarlet Witch'}, {id: 3, name: 'Hulk'} ]; filteredHeroes = this.heroes; setSearchHero(e: Event) { this.search = (e.target as HTMLInputElement).value this.filteredHeroes = this.heroes.filter( hero => hero.name.startsWith(this.search) ) } addHero() { this.heroes = [...this.heroes, {id:4, name: 'Iron Man'}] } }"
          - paragraph [ref=f20e79]:
            - text: Absolutely, nothing special indeed!
            - img "😄" [ref=f20e80]
            - text: Now, let’s dive into the fun part of using the Signal API.
          - separator [ref=f20e81]
          - paragraph [ref=f20e82]:
            - text: "The Signals API offers several functions that are useful for our daily tasks. We categorize signals into two types:"
            - strong [ref=f20e83]:
              - emphasis [ref=f20e84]: writable signals
            - text: ", which allow direct modification of their values, and"
            - strong [ref=f20e85]:
              - emphasis [ref=f20e86]: computed signals
            - text: ", which derive their values from other signals and are read-only by nature."
          - paragraph [ref=f20e87]:
            - text: Let’s see them in action one by one
            - img "😉" [ref=f20e88]
          - heading "Writable Signals" [level=3] [ref=f20e89]:
            - strong [ref=f20e90]: Writable Signals
          - heading "How to Create a Writable Signal?" [level=4] [ref=f20e91]
          - paragraph [ref=f20e92]:
            - text: To get started, we need to import the signal function from the
            - emphasis [ref=f20e93]:
              - strong [ref=f20e94]: "@angular/core"
            - text: package.
          - code [ref=f20e96]: "import { ..., signal } from '@angular/core';"
          - paragraph [ref=f20e97]:
            - text: "Creating a signal itself is straightforward: we call the"
            - code [ref=f20e98]: signal
            - text: function with the initial value. Usually, the type of Signal and its value will be automatically inferred by TypeScript. I typed the
            - code [ref=f20e99]: search
            - text: property just for demo purposes
            - img "😉" [ref=f20e100]
          - code [ref=f20e102]: "export class SearchHeroComponent { search: WritableSignal<string> = signal('') ... }"
          - paragraph [ref=f20e103]: As I mentioned earlier, you can use any data structure as a signal value so we can refactor our hero’s array to the signal as well.
          - code [ref=f20e105]: "heroes = signal([ { id: 1, name: 'Spider-Man' }, // ... ])"
          - paragraph
          - heading "How to change the signal Value" [level=4] [ref=f20e106]
          - paragraph [ref=f20e107]:
            - text: When a user types a new value in the text input, the value of the
            - strong [ref=f20e108]: search
            - text: signal has to be updated accordingly. To update the value of this
            - emphasis [ref=f20e109]:
              - strong [ref=f20e110]
            - text: signal, we can use
            - emphasis [ref=f20e111]:
              - strong [ref=f20e112]: set()
            - text: ", which sets up a new value and notifies any dependent signals. Below, you can see how to do that."
          - code [ref=f20e114]: "setSearchHero(e: Event) { this.search.set((e.target as HTMLInputElement).value) //... }"
          - paragraph [ref=f20e115]:
            - text: However, in certain situations, when you work with non-primitive data structures, we need to update or recalculate values based on their previous value (exactly the case with our heroes array). To address this, the Signals API provides
            - strong [ref=f20e116]:
              - emphasis [ref=f20e117]
            - text: an
            - strong [ref=f20e118]: update()
            - text: method.
          - paragraph [ref=f20e119]:
            - strong [ref=f20e120]: update()
            - text: ": allows you to modify the value of the signal, forcing you to do it in an immutable way. For example, to add a new hero, we provide a callback function that takes a current"
            - code [ref=f20e121]: heroes
            - text: signal value as an argument and returns a new one based on the current
            - code [ref=f20e122]: heroes
            - text: array.
          - paragraph [ref=f20e123]:
            - text: To make sure that we did it immutably, we made a copy of the current
            - code [ref=f20e124]: heroes
            - text: array using the spread operator
            - code [ref=f20e125]: "[...hero]"
            - text: and eventually, add a new hero to the end of this new array.
          - code [ref=f20e127]: "addHero() { this.heroes.update(heroes => [...heroes, {id:3, name: 'Iron Man'}]) }"
          - paragraph [ref=f20e128]:
            - strong [ref=f20e129]: NOTE!
            - text: This last step is very important because if you simply mutate the array using something like
            - code [ref=f20e130]: Array.push
            - text: ", then other dependent signals won’t be notified of this change."
          - heading "Reading the signal value" [level=4] [ref=f20e131]
          - paragraph [ref=f20e132]:
            - text: Now, we can read value changes from the signal by unwrapping it, e.g., in the component template using parenthesis. It might remind you of something like
            - strong [ref=f20e133]: Observable.subscribe()
            - text: to read the value from the stream, which we covered in
            - link "Streams Analogs In Real Life" [ref=f20e134] [cursor=pointer]:
              - /url: https://decodedfrontend.io/rxjs-streams-analogs-in-real-life/
            - text: post.
          - code [ref=f20e136]: "<p>Search Hero: {{search()}}</p>"
          - heading "Read-only Signal" [level=4] [ref=f20e137]
          - paragraph [ref=f20e138]:
            - text: The last function in the Writable Signals API is
            - strong [ref=f20e139]: asReadOnly()
            - text: ", which returns a read-only version of the signal. Read-only signals can be accessed to read their value but can’t be changed using"
            - strong [ref=f20e140]:
              - emphasis [ref=f20e141]: set()
            - text: or
            - strong [ref=f20e142]:
              - emphasis [ref=f20e143]: update()
            - text: methods.
          - code [ref=f20e145]: ... readonly _search = this.search.asReadonly()
          - paragraph [ref=f20e146]: "In your template, we can bind to this read-only signal as a regular signal:"
          - code [ref=f20e148]:
            - generic [ref=f20e149]:
              - generic [ref=f20e150]: <p
              - text: ">"
            - text: "Search Hero: {{_search()}}"
            - generic [ref=f20e151]:
              - generic [ref=f20e152]: </p
              - text: ">"
          - paragraph [ref=f20e153]:
            - strong [ref=f20e154]: Note!
            - text: It is important to note that
            - strong [ref=f20e155]: asReadOnly()
            - text: does not inherently prevent deep mutation of their value, e.g., if the value of the signal is an object, you can mutate its property (but it is not recommended).
          - paragraph
          - separator [ref=f20e156]
          - heading "Computed signals" [level=3] [ref=f20e157]:
            - strong [ref=f20e158]: Computed signals
          - heading "Derived values from multiple signals" [level=4] [ref=f20e159]
          - paragraph [ref=f20e160]:
            - strong [ref=f20e161]: computed()
            - text: ": computes a new Signal, obtaining a reactive value through a combination of other signals. The compiler then interprets these signals to create a new derived value. This provides a powerful mechanism for creating dynamic and reactive values within your application."
          - code [ref=f20e163]: filteredHeroes = computed( () => this.heroes().filter( hero => hero.name.startsWith(this._search()) ) )
          - paragraph [ref=f20e164]:
            - text: Here, the
            - strong [ref=f20e165]:
              - emphasis [ref=f20e166]: filteredHeroes
            - text: property is a computed signal that dynamically filters the heroes based on the current search criteria. Whenever the
            - strong [ref=f20e167]:
              - emphasis [ref=f20e168]: heroes()
            - text: signal or the
            - strong [ref=f20e169]:
              - emphasis [ref=f20e170]: search()
            - text: changes, the computation is automatically re-executed to update
            - emphasis [ref=f20e171]:
              - strong [ref=f20e172]: filteredHeroes
            - text: ", ensuring that everything is reactively updated and adapts to changes seamlessly."
          - paragraph [ref=f20e173]:
            - text: To display these filtered heroes, we leverage Angular’s newly redesigned control flow syntax,
            - strong [ref=f20e174]:
              - emphasis [ref=f20e175]: "@for."
            - text: This modern syntax offers a more concise, performant, type-safe, and readable way to iterate over collections.
          - code [ref=f20e177]:
            - generic [ref=f20e178]:
              - generic [ref=f20e179]: <ul
              - text: ">"
            - text: "@for (hero of filteredHeroes(); track hero.id) {"
            - generic [ref=f20e180]:
              - generic [ref=f20e181]: <li
              - text: ">"
            - text: "{{hero.name}}"
            - generic [ref=f20e182]:
              - generic [ref=f20e183]: </li
              - text: ">"
            - text: "}"
            - generic [ref=f20e184]:
              - generic [ref=f20e185]: </ul
              - text: ">"
          - heading "Signals and side effects" [level=4] [ref=f20e186]
          - paragraph [ref=f20e187]:
            - text: For scenarios where we wish to execute side effects in response to signal value changes, such as storing the search value in local storage for reuse upon page reload, we can employ the
            - emphasis [ref=f20e188]:
              - strong [ref=f20e189]: effect()
            - text: function.
          - paragraph [ref=f20e190]: This adds a layer of flexibility and functionality by enabling additional behaviors or actions tied to signal value changes. Effects are always executed asynchronously during the change detection process.
          - code [ref=f20e192]: "logger = effect(() => { localStorage.setItem('searchHero', this._search()) })"
          - paragraph [ref=f20e193]:
            - strong [ref=f20e194]: "effect():"
            - text: Triggers operations whenever one or more signal values change, ensuring at least one execution. Such dynamic behavior guarantees real-time responsiveness to signal changes, facilitating the execution of side effects and keeping the application’s state synchronized with the data.
          - paragraph
          - figure "storing search results in local storage" [ref=f20e195]:
            - generic [ref=f20e196]: storing search results in local storage
          - figure [ref=f20e197]
          - paragraph
          - paragraph [ref=f20e198]:
            - text: As a final touch, let’s initialize our
            - code [ref=f20e199]: search
            - text: signal with a value from the value we saved in the browser’s local storage or an empty string otherwise. We can simply modify the logic when we create the corresponding signal like that
          - code [ref=f20e201]: search = signal(localStorage.getItem('searchHero') || '')
          - heading "Conclusion" [level=3] [ref=f20e202]:
            - strong [ref=f20e203]: Conclusion
          - paragraph [ref=f20e204]:
            - text: I hope
            - img "🤓" [ref=f20e205]
            - text: you will rewrite your enterprise applications with signals and remove all the boilerplate and clutter. Remember, using the right tool for the right job is key. Do not use Signals for everything. Signals are great for synchronous reactivity and state management. For asynchronous reactivity and events, RxJS remains the superior choice.
          - paragraph [ref=f20e206]:
            - text: In case you are wondering
            - img "🤔" [ref=f20e207]
            - text: What about RxJs and turning your Observables and Subjects into Signals? Don’t worry. The Angular team has the answer to this question with the RxJS Interop API, which we will cover in the next blog post. Stay tuned and focus on Signals
            - img "🚦" [ref=f20e208]
            - text: while you are driving.
          - paragraph [ref=f20e209]:
            - text: To play with the demo application I used for the article, you can check out this
