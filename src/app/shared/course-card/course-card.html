<a
  [routerLink]="['/courses', course().slug]"
  class="flex flex-col overflow-hidden rounded-lg bg-white shadow-sm transition-transform hover:-translate-y-0.5 hover:shadow-md"
>
  <div class="bg-gray-50 px-6 pb-4 pt-6">
    <span class="mb-2 block text-xs font-semibold uppercase tracking-wide text-neutral-400">All Courses</span>

    @if (course().isBundle) {
      <h3 class="text-lg font-semibold text-neutral-900">All-in-One Bundle</h3>
    } @else {
      <h3 class="text-lg font-semibold text-neutral-900">{{ course().title }}</h3>
      <div class="mt-2 flex items-center gap-2 text-sm text-neutral-500">
        <app-star-rating [rating]="course().avgRating" />
        <span>({{ course().reviews }})</span>
        <span>{{ course().avgRating }} average rating</span>
      </div>
    }
  </div>

  <div class="flex h-40 items-center justify-center bg-gradient-to-br from-brand-teal to-brand-coral">
    <span class="text-5xl font-bold text-white/90">{{ initial() }}</span>
  </div>

  <div class="flex items-stretch divide-x divide-neutral-200 bg-gray-100 text-xs font-semibold uppercase tracking-wide text-neutral-500">
    @if (course().isBundle) {
      <span class="flex-1 px-4 py-3">6 Courses</span>
    } @else {
      <span class="flex-1 px-4 py-3">{{ course().lessons }} Lessons</span>
    }
    <span class="flex-1 px-4 py-3">{{ course().price }}</span>
  </div>
</a>
