<nav class="flex items-center justify-between gap-4 border-b border-gray-200 px-4 py-3">
  <div class="flex items-center gap-4">
    <a routerLink="/products" routerLinkActive="font-semibold" class="text-sm text-gray-700 hover:text-gray-900">Products</a>
    <a routerLink="/carts" routerLinkActive="font-semibold" class="text-sm text-gray-700 hover:text-gray-900">Carts</a>
    <a routerLink="/users" routerLinkActive="font-semibold" class="text-sm text-gray-700 hover:text-gray-900">Users</a>
    <a routerLink="/posts" routerLinkActive="font-semibold" class="text-sm text-gray-700 hover:text-gray-900">Posts</a>
  </div>

  @if (user(); as currentUser) {
    <div class="flex items-center gap-3">
      <img [src]="currentUser.image" [alt]="currentUser.username" class="h-8 w-8 rounded-full" />
      <span class="text-sm text-gray-900">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
      <button
        type="button"
        (click)="logout.emit()"
        class="rounded border border-gray-300 px-3 py-1 text-sm text-gray-700 hover:bg-gray-100"
      >
        Logout
      </button>
    </div>
  }
</nav>
