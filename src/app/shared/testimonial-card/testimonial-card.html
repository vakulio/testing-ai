<mat-card appearance="outlined" class="flex h-full flex-col p-6">
  <span class="inline-flex items-center gap-0.5" aria-label="Rating: {{ testimonial().rating }} out of 5">
    @for (filled of stars(); track $index) {
      <mat-icon
        class="!h-4 !w-4 !text-base leading-none"
        [class]="filled ? '!text-brand-coral' : '!text-gray-300'"
      >{{ filled ? 'star' : 'star_border' }}</mat-icon>
    }
  </span>
  <h3 class="mt-3 font-display text-lg font-semibold text-brand-coral">{{ testimonial().title }}</h3>
  <h4 class="mt-1 text-sm font-medium text-neutral-700">{{ testimonial().author }}</h4>
  <p class="mt-3 line-clamp-3 text-neutral-600">{{ testimonial().quote }}</p>
  <button matButton="text" class="mt-2 w-fit !px-0 !text-brand-coral" (click)="$event.preventDefault()">Read More</button>
</mat-card>
