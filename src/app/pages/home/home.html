<app-header />

<section class="relative overflow-hidden bg-brand-teal bg-[radial-gradient(circle_at_30%_20%,rgba(255,255,255,0.06),transparent_60%)]">
  <div class="mx-auto max-w-6xl px-4 py-24 text-center sm:px-6 sm:py-32">
    <h1 class="text-4xl font-bold tracking-tight text-white sm:text-5xl">Decoded Frontend</h1>
    <p class="mx-auto mt-4 max-w-2xl text-lg text-neutral-200">
      Blog about advanced Frontend Development focused on Angular &amp; GraphQL
    </p>
  </div>
</section>

<main class="mx-auto max-w-3xl px-4 py-16 sm:px-6">
  <div class="text-center">
    <h3 class="text-xs font-semibold uppercase tracking-widest text-brand-teal">Latest Tutorials</h3>
    <div class="mx-auto mt-3 h-0.5 w-10 bg-brand-coral"></div>
  </div>

  <div class="mt-12 flex flex-col">
    @for (t of tutorials(); track t.slug) {
      <app-tutorial-card [tutorial]="t" />
    }
  </div>

  <div class="mt-10 flex justify-center">
    <button
      type="button"
      disabled
      class="cursor-not-allowed bg-brand-teal px-6 py-2.5 text-sm font-medium uppercase tracking-wide text-white opacity-60"
    >
      Load More
    </button>
  </div>
</main>

<app-footer />
