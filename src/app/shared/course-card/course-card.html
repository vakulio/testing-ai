<a
  [routerLink]="['/courses', course().slug]"
  class="flex flex-col rounded-lg bg-white p-6 shadow-sm transition-transform hover:-translate-y-0.5 hover:shadow-md"
>
  <span class="mb-3 w-fit rounded-full bg-orange-50 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-orange-500">
    All Courses
  </span>

  @if (course().isBundle) {
    <h3 class="text-lg font-semibold text-neutral-900">All-in-One Bundle</h3>
    <p class="mt-2 text-2xl font-semibold text-neutral-900">{{ course().price }}</p>
    <span class="mt-3 w-fit rounded-full bg-neutral-100 px-3 py-1 text-xs font-medium text-neutral-600">6 Courses</span>
  } @else {
    <h3 class="text-lg font-semibold text-neutral-900">{{ course().title }}</h3>
    <div class="mt-2 flex items-center gap-2 text-sm text-neutral-500">
      <app-star-rating [rating]="course().avgRating" />
      <span>({{ course().reviews }})</span>
      <span>{{ course().avgRating }} average rating</span>
    </div>
    <p class="mt-2 text-sm text-neutral-500">{{ course().lessons }} Lessons</p>
    <p class="mt-3 text-2xl font-semibold text-neutral-900">{{ course().price }}</p>
  }
</a>
