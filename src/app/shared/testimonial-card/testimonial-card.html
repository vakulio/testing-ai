<article class="flex flex-col rounded-lg bg-white p-6 shadow-sm">
  <app-star-rating [rating]="testimonial().rating" />
  <h3 class="mt-3 text-lg font-semibold text-neutral-900">{{ testimonial().title }}</h3>
  <h4 class="mt-1 text-sm font-medium text-neutral-500">{{ testimonial().author }}</h4>
  <p class="mt-3 line-clamp-3 text-neutral-600">{{ testimonial().quote }}</p>
  <a href="#" class="mt-2 w-fit text-sm font-medium text-orange-500 hover:text-orange-600" (click)="$event.preventDefault()">Read More</a>
</article>
