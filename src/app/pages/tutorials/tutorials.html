<app-header />

<main class="mx-auto max-w-3xl px-4 py-16 sm:px-6">
  <div class="text-center">
    @if (tag()) {
      <p class="font-mono text-xs lowercase tracking-widest text-brand-coral">// tagged: {{ tag() }}</p>
    } @else {
      <p class="font-mono text-xs lowercase tracking-widest text-brand-coral">// all tutorials</p>
    }
    <h1 class="mt-3 font-display text-3xl font-semibold text-brand-teal sm:text-[35px]">Tutorials</h1>
    <div class="mx-auto mt-3 h-0.5 w-10 bg-brand-coral"></div>
  </div>

  <div class="mt-12 flex flex-col">
    @for (t of tutorials(); track t.slug) {
      <app-tutorial-card [tutorial]="t" />
    }
  </div>

  <div class="mt-10 flex justify-center">
    <button matButton="filled" type="button" disabled>Load More</button>
  </div>
</main>

<app-footer />
