<nav class="border-b-2 border-ink bg-paper-deep px-4 sm:px-6">
  <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 py-3">
    <div class="flex flex-wrap items-center gap-x-6 gap-y-2">
      <a routerLink="/products" class="font-display text-sm tracking-[0.2em] text-ink uppercase whitespace-nowrap">
        <span class="text-brass">▮▮</span> The Archive
      </a>

      <div class="flex items-center gap-1 text-sm">
        <a
          routerLink="/products"
          routerLinkActive="border-teal text-ink"
          class="border-b-[3px] border-transparent px-2 py-1.5 font-medium text-ink-soft transition-colors hover:text-ink"
          >Products</a
        >
        <a
          routerLink="/carts"
          routerLinkActive="border-slate text-ink"
          class="border-b-[3px] border-transparent px-2 py-1.5 font-medium text-ink-soft transition-colors hover:text-ink"
          >Carts</a
        >
        <a
          routerLink="/users"
          routerLinkActive="border-brass text-ink"
          class="border-b-[3px] border-transparent px-2 py-1.5 font-medium text-ink-soft transition-colors hover:text-ink"
          >Users</a
        >
        <a
          routerLink="/posts"
          routerLinkActive="border-brick text-ink"
          class="border-b-[3px] border-transparent px-2 py-1.5 font-medium text-ink-soft transition-colors hover:text-ink"
          >Posts</a
        >
      </div>
    </div>

    @if (user(); as currentUser) {
      <div class="card flex items-center gap-3 px-3 py-1.5">
        <img
          [src]="currentUser.image"
          [alt]="currentUser.username"
          class="h-7 w-7 rounded-full border border-rule object-cover"
        />
        <div class="leading-tight">
          <p class="text-xs font-semibold text-ink">{{ currentUser.firstName }} {{ currentUser.lastName }}</p>
          <p class="call-number">MEMBER No. {{ currentUser.id.toString().padStart(4, '0') }}</p>
        </div>
        <button
          type="button"
          (click)="logout.emit()"
          class="font-data ml-2 rounded-[2px] border border-ink px-2 py-1 text-[11px] tracking-wide text-ink uppercase transition-colors hover:bg-ink hover:text-paper-raised"
        >
          Sign out
        </button>
      </div>
    }
  </div>
</nav>
