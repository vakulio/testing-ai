<article class="rounded-lg bg-white p-6 shadow-sm transition-transform hover:-translate-y-0.5 hover:shadow-md">
  <h2 class="text-xl font-semibold text-neutral-900">
    <a [routerLink]="['/tutorials', tutorial().slug]" class="hover:text-orange-500">{{ tutorial().title }}</a>
  </h2>

  <p class="mt-2 text-sm text-neutral-500">
    By {{ tutorial().author }} / In {{ tutorial().categories.join(', ') }} / {{ tutorial().readTime }}
  </p>
  <p class="text-sm text-neutral-400">{{ tutorial().date }}</p>

  <p class="mt-4 text-neutral-600">{{ tutorial().excerpt }}</p>

  <div class="mt-4 flex items-center gap-4 text-sm font-medium">
    <a [routerLink]="['/tutorials', tutorial().slug]" class="text-orange-500 hover:text-orange-600">Read on</a>
    <a href="#" class="text-neutral-400 hover:text-neutral-600" (click)="$event.preventDefault()">Read later</a>
  </div>
</article>
