    - figure [ref=f37e25]
    - paragraph [ref=f37e26]: Signals are a new reactive primitive in Angular that let the framework track exactly which parts of your component depend on which pieces of state, enabling fine-grained change detection without zone.js.
    - separator [ref=f37e27]
    - generic [ref=f37e28]:
      - generic [ref=f37e29]:
        - heading "Creating a signal" [level=3] [ref=f37e30]
        - paragraph [ref=f37e31]: A signal wraps a value and notifies consumers whenever that value changes. Reading a signal inside a template or a computed automatically subscribes that consumer to future updates.
        - code [ref=f37e33]: "import { signal } from '@angular/core'; const count = signal(0); count.set(count() + 1);"
      - generic [ref=f37e34]:
        - heading "Derived state with computed" [level=3] [ref=f37e35]
        - paragraph [ref=f37e36]: computed() lets you derive new signals from existing ones. The derived value is recalculated lazily and only when one of its dependencies actually changes, which keeps expensive calculations cheap.
      - generic [ref=f37e37]:
        - heading "Effects" [level=3] [ref=f37e38]
        - paragraph [ref=f37e39]: effect() runs side effects whenever the signals it reads change, which is useful for syncing state to localStorage, logging, or triggering imperative DOM APIs outside of the render cycle.
