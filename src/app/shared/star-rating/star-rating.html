<span class="inline-flex items-center gap-0.5" aria-label="Rating: {{ rating() }} out of 5">
  @for (filled of stars(); track $index) {
    <mat-icon
      class="!h-4 !w-4 !text-base leading-none"
      [class]="filled ? filledClass() : '!text-gray-300'"
    >{{ filled ? 'star' : 'star_border' }}</mat-icon>
  }
</span>
