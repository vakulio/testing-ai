    - heading "First look at Signals in Angular" [level=1] [ref=f37e14]
    - paragraph [ref=f37e15]:
      - generic [ref=f37e16]: By Tom Kotlar
      - generic [ref=f37e17]: /
      - generic [ref=f37e18]: In Angular
      - generic [ref=f37e19]: /
