<app-header />

<section class="relative overflow-hidden bg-brand-teal bg-[radial-gradient(circle_at_30%_20%,rgba(255,255,255,0.06),transparent_60%)]">
  <div class="mx-auto max-w-6xl px-4 py-24 text-center sm:px-6 sm:py-32">
    <h1 class="font-display text-5xl font-medium leading-tight text-white sm:text-6xl">
      Decoded
      <span
        class="inline-block rounded-md border border-brand-coral/40 bg-brand-coral/10 px-2 py-0.5 font-mono text-[0.8em] text-brand-coral"
        >Frontend</span
      >
    </h1>
    <p class="mx-auto mt-4 max-w-2xl text-base text-white">
      Blog about advanced Frontend Development focused on Angular &amp; GraphQL
    </p>
  </div>
</section>

<main class="mx-auto max-w-3xl px-4 py-16 sm:px-6">
  <div class="text-center">
    <p class="font-mono text-xs lowercase tracking-widest text-brand-coral">// latest tutorials</p>
    <div class="mx-auto mt-3 h-0.5 w-10 bg-brand-coral"></div>
  </div>

  <div class="mt-12 flex flex-col">
    @for (t of tutorials(); track t.slug) {
      <app-tutorial-card [tutorial]="t" />
    }
  </div>

  <div class="mt-10 flex justify-center">
    <button matButton="filled" type="button" disabled>Load More</button>
  </div>
</main>

<app-footer />
