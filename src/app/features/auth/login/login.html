<div class="card mx-auto mt-16 max-w-sm p-6">
  <span class="tab tab-users">Member access</span>

  <p class="eyebrow mb-1">The Archive</p>
  <h1 class="font-display mb-1 text-lg text-ink">Sign the ledger</h1>
  <p class="mb-5 text-xs text-ink-soft">
    Demo credentials: <span class="font-data font-medium text-ink">emilys</span> /
    <span class="font-data font-medium text-ink">emilyspass</span>
  </p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
    <label class="flex flex-col gap-1.5 text-sm text-ink">
      <span class="eyebrow">Username</span>
      <input
        type="text"
        formControlName="username"
        autocomplete="username"
        class="rounded-[2px] border border-rule bg-paper px-3 py-2 text-sm text-ink focus:border-brass focus:outline-none"
      />
    </label>

    <label class="flex flex-col gap-1.5 text-sm text-ink">
      <span class="eyebrow">Password</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="rounded-[2px] border border-rule bg-paper px-3 py-2 text-sm text-ink focus:border-brass focus:outline-none"
      />
    </label>

    @if (errorMessage(); as message) {
      <p class="stamp border-brick text-brick" role="alert">{{ message }}</p>
    }

    <button
      type="submit"
      [disabled]="form.invalid || submitting()"
      class="rounded-[2px] bg-ink px-4 py-2.5 text-sm font-medium text-paper-raised transition-colors hover:bg-brass disabled:opacity-50"
    >
      {{ submitting() ? 'Checking the index…' : 'Sign in' }}
    </button>
  </form>
</div>
