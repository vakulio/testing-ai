<aside class="flex flex-col gap-8">
  <div class="flex items-center justify-between">
    <h3 class="font-mono text-xs uppercase tracking-widest text-brand-teal">// menu</h3>
    <button
      mat-icon-button
      type="button"
      (click)="uiState.close()"
      aria-label="Close menu"
      class="text-neutral-500 transition-colors hover:text-brand-coral"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div>
    <h3 class="mb-3 font-mono text-xs uppercase tracking-widest text-brand-teal">// search</h3>
    <form (submit)="$event.preventDefault()">
      <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
        <input matInput type="text" placeholder="Type here to search..." />
        <button matSuffix mat-icon-button type="submit" (click)="onSearch()" aria-label="Search">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </form>
  </div>

  <div>
    <h3 class="mb-3 font-mono text-xs uppercase tracking-widest text-brand-teal">// tags</h3>
    <mat-chip-set aria-label="Tags">
      @for (tag of tags; track tag.slug) {
        <a mat-chip [routerLink]="['/tutorials']" [queryParams]="{ tag: tag.slug }" (click)="uiState.close()">
          {{ tag.label }} ({{ tag.count }})
        </a>
      }
    </mat-chip-set>
  </div>
</aside>
