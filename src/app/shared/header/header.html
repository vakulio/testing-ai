<header class="sticky top-0 z-50 border-b border-neutral-200 bg-white/90 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
    @if (variant() === 'blog') {
      <a routerLink="/" class="text-lg font-semibold tracking-tight text-neutral-900">Decoded Frontend</a>

      <nav class="hidden items-center gap-8 text-sm font-medium text-neutral-600 md:flex">
        <a href="https://youtube.com/DecodedFrontend" target="_blank" rel="noopener" class="transition-colors hover:text-orange-500">YouTube</a>
        <a routerLink="/tutorials" class="transition-colors hover:text-orange-500">Blog</a>
        <a routerLink="/courses" class="transition-colors hover:text-orange-500">Courses</a>
        <a routerLink="/recommendations" class="transition-colors hover:text-orange-500">Recommendations</a>
      </nav>
    } @else {
      <a routerLink="/courses" class="text-lg font-semibold tracking-tight text-neutral-900">Mezhenskyi Dmytro</a>

      <nav class="hidden items-center gap-8 text-sm font-medium text-neutral-600 md:flex">
        <a routerLink="/courses" class="transition-colors hover:text-orange-500">All Courses</a>
        <button type="button" disabled class="cursor-not-allowed rounded-full border border-neutral-300 px-4 py-1.5 text-neutral-400">Sign In</button>
      </nav>
    }

    <button
      type="button"
      class="inline-flex h-9 w-9 items-center justify-center rounded-md text-neutral-600 md:hidden"
      aria-label="Toggle menu"
      (click)="toggleMobileMenu()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-6 w-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  @if (mobileMenuOpen()) {
    <nav class="flex flex-col gap-1 border-t border-neutral-200 bg-white px-4 py-3 text-sm font-medium text-neutral-600 md:hidden">
      @if (variant() === 'blog') {
        <a href="https://youtube.com/DecodedFrontend" target="_blank" rel="noopener" class="rounded px-2 py-2 hover:bg-neutral-50 hover:text-orange-500">YouTube</a>
        <a routerLink="/tutorials" class="rounded px-2 py-2 hover:bg-neutral-50 hover:text-orange-500">Blog</a>
        <a routerLink="/courses" class="rounded px-2 py-2 hover:bg-neutral-50 hover:text-orange-500">Courses</a>
        <a routerLink="/recommendations" class="rounded px-2 py-2 hover:bg-neutral-50 hover:text-orange-500">Recommendations</a>
      } @else {
        <a routerLink="/courses" class="rounded px-2 py-2 hover:bg-neutral-50 hover:text-orange-500">All Courses</a>
        <button type="button" disabled class="w-fit cursor-not-allowed rounded-full border border-neutral-300 px-4 py-1.5 text-left text-neutral-400">Sign In</button>
      }
    </nav>
  }
</header>
