<div class="mx-auto max-w-5xl px-4 py-6">
  <h1 class="mb-4 text-xl font-semibold text-gray-900">Products</h1>

  <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center">
    <div class="sm:max-w-xs sm:flex-1">
      <app-search-box
        placeholder="Search products…"
        [query]="query()"
        (queryChange)="onQueryChange($event)"
      />
    </div>

    <select
      class="rounded border border-slate-300 px-3 py-2 text-sm"
      [value]="category() ?? ''"
      (change)="onCategoryChange($any($event.target).value)"
    >
      <option value="">All categories</option>
      @for (cat of categories.value() ?? []; track cat) {
        <option [value]="cat">{{ cat }}</option>
      }
    </select>
  </div>

  @if (products.loading()) {
    <app-loading-spinner />
  } @else if (products.error()) {
    <app-error-message message="Failed to load products. Please try again." />
  } @else if (products.value(); as response) {
    @if (response.products.length === 0) {
      <app-empty-state message="No products match your search." />
    } @else {
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3">
        @for (product of response.products; track product.id) {
          <a
            [routerLink]="['/products', product.id]"
            class="flex flex-col gap-2 rounded-lg border border-gray-200 p-4 shadow-sm transition hover:shadow-md"
          >
            <img [src]="product.thumbnail" [alt]="product.title" class="h-32 w-full rounded object-cover" />
            <h2 class="text-sm font-medium text-gray-900">{{ product.title }}</h2>
            <p class="text-xs text-gray-500">{{ product.category }}</p>
            <p class="text-sm font-semibold text-gray-900">${{ product.price }}</p>
          </a>
        }
      </div>

      <app-pagination
        [total]="response.total"
        [skip]="response.skip"
        [limit]="response.limit"
        (pageChange)="onPageChange($event)"
      />
    }
  }
</div>
