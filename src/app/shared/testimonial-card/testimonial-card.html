<article class="flex h-full flex-col rounded-lg border border-neutral-100 bg-white p-6 shadow-sm">
  <span class="inline-flex items-center gap-0.5" aria-label="Rating: {{ testimonial().rating }} out of 5">
    @for (filled of stars(); track $index) {
      <span class="text-base leading-none" [class.text-brand-coral]="filled" [class.text-gray-300]="!filled">★</span>
    }
  </span>
  <h3 class="mt-3 text-lg font-semibold text-brand-coral">{{ testimonial().title }}</h3>
  <h4 class="mt-1 text-sm font-medium text-neutral-700">{{ testimonial().author }}</h4>
  <p class="mt-3 line-clamp-3 text-neutral-600">{{ testimonial().quote }}</p>
  <a href="#" class="mt-2 w-fit text-sm font-medium text-brand-coral hover:opacity-80" (click)="$event.preventDefault()">Read More</a>
</article>
